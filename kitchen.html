<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPOHAYO — Kitchen Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* High-contrast kitchen board — readable from across the counter */
    :root {
      --bg:      #0a0a0a;
      --surface: #111;
      --card:    #161616;
      --border:  #222;
      --accent:  #f5c518;
      --text:    #f0f0f0;
      --muted:   #666;
      --pending: #f5c518;
      --cooking: #e8602c;
      --ready:   #27c06a;
      --served:  #3a3a3a;
      --eatin:   #27c06a;
      --takeout: #e8602c;
      --radius:  12px;
      --font-head: 'Bebas Neue', Impact, sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .top-bar {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0 28px;
      display: flex; align-items: center;
      justify-content: space-between;
      height: 64px; gap: 16px;
    }
    .kitchen-logo {
      font-family: var(--font-head);
      font-size: 2rem; letter-spacing: 0.08em; color: var(--accent);
    }
    .kitchen-logo span { color: var(--muted); font-size: 1rem; letter-spacing: 0.2em; margin-left: 10px; }
    #clock { font-family: var(--font-head); font-size: 1.8rem; color: var(--text); letter-spacing: 0.1em; }
    .top-status { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--muted); }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); transition: background 0.4s; }
    .status-dot.connected    { background: var(--ready); box-shadow: 0 0 8px var(--ready); }
    .status-dot.disconnected { background: #c0392b; }

    /* ── LEGEND BAR ── */
    /* Small row showing what eat-in vs take-out colours mean */
    .legend-bar {
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      padding: 8px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.74rem;
      color: var(--muted);
    }
    .legend-dot {
      display: inline-flex; align-items: center; gap: 6px;
    }
    .legend-dot::before {
      content: '';
      display: inline-block; width: 10px; height: 10px; border-radius: 2px;
    }
    .legend-eatin::before  { background: rgba(39,192,106,0.5); }
    .legend-takeout::before{ background: rgba(232,96,44,0.5); }
    .legend-sep { margin-left: auto; }

    /* ── STATS / FILTER TABS ── */
    .stats-bar {
      display: flex; gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      flex: 1; padding: 14px 10px; text-align: center;
      border-right: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
      position: relative;
    }
    .stat:last-child { border-right: none; }
    .stat:hover { background: #1a1a1a; }
    .stat.active::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: var(--accent);
    }
    .stat-num   { font-family: var(--font-head); font-size: 2rem; line-height: 1; }
    .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
    .num-all     { color: var(--text); }
    .num-pending { color: var(--pending); }
    .num-cooking { color: var(--cooking); }
    .num-ready   { color: var(--ready);   }
    .num-served  { color: var(--served);  }

    /* ── ORDER GRID ── */
    .orders-area { padding: 20px 24px 40px; }
    .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; }

    .no-orders { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
    .no-orders .big-emoji { font-size: 4rem; margin-bottom: 12px; display: block; }

    /* ── ORDER CARD ── */
    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: cardIn 0.3s ease;
      display: flex; flex-direction: column;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* Status colour stripe at top of each card */
    .card-stripe { height: 4px; background: var(--pending); transition: background 0.4s; }
    .card-stripe.cooking { background: var(--cooking); }
    .card-stripe.ready   { background: var(--ready); }
    .card-stripe.served  { background: var(--served); }

    /* Card header row */
    .card-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
    }
    .card-order-id {
      font-family: var(--font-head); font-size: 1.5rem;
      letter-spacing: 0.06em; color: var(--accent); line-height: 1;
    }

    /* Order type badge — green strip for eat-in, orange for takeout */
    .card-order-type {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 3px 9px; border-radius: 6px; margin-top: 5px;
    }
    .type-eatin  { background: rgba(39,192,106,0.15); color: var(--eatin);  }
    .type-takeout{ background: rgba(232,96,44,0.15);  color: var(--takeout);}

    .card-table { font-size: 0.82rem; color: var(--text); margin-top: 2px; font-weight: 500; }

    .card-time-block { text-align: right; }
    .card-time    { font-size: 0.75rem; color: var(--muted); }
    .card-elapsed {
      font-family: var(--font-head); font-size: 1.1rem;
      letter-spacing: 0.05em; color: var(--text); margin-top: 2px;
    }
    .card-elapsed.warn  { color: var(--cooking); }
    .card-elapsed.alert { color: #e74c3c; }

    /* Item rows */
    .card-items { padding: 12px 16px; flex: 1; }
    .card-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid #1e1e1e;
      font-size: 0.9rem;
    }
    .card-item:last-child { border-bottom: none; }
    .card-item-label {
      font-size: 0.64rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      background: #1e1e1e; padding: 2px 6px; border-radius: 4px;
      white-space: nowrap;
    }

    /* Card footer: status + action buttons */
    .card-footer {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .status-pill {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 4px 10px; border-radius: 20px;
    }
    .pill-pending { background: rgba(245,197,24,0.15); color: var(--pending); }
    .pill-cooking { background: rgba(232,96,44,0.15);  color: var(--cooking); }
    .pill-ready   { background: rgba(39,192,106,0.15); color: var(--ready);   }
    .pill-served  { background: rgba(58,58,58,0.4);    color: var(--muted);   }

    .card-actions { display: flex; gap: 6px; }
    .action-btn {
      padding: 6px 12px; border: none; border-radius: 6px;
      font-family: var(--font-body); font-weight: 600; font-size: 0.78rem;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .action-btn:hover  { opacity: 0.85; transform: scale(1.04); }
    .action-btn:active { transform: scale(0.97); }
    .btn-start  { background: var(--cooking); color: #fff; }
    .btn-ready  { background: var(--ready);   color: #fff; }
    .btn-served { background: #444;           color: var(--text); }
    .btn-delete { background: transparent; border: 1px solid #333; color: var(--muted); padding: 6px 8px; }
    .btn-delete:hover { border-color: #e74c3c; color: #e74c3c; }

    /* Yellow screen-flash for new incoming orders */
    .new-order-flash {
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background: rgba(245,197,24,0.08);
      animation: flashOut 0.7s ease forwards;
    }
    @keyframes flashOut { from { opacity: 1; } to { opacity: 0; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="kitchen-logo">TPOHAYO <span>KITCHEN</span></div>
    <div id="clock">00:00:00</div>
    <div class="top-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="legend-bar">
    <span class="legend-dot legend-eatin">Eat Here</span>
    <span class="legend-dot legend-takeout">Take Out</span>
    <span class="legend-sep">⏱ Timer turns orange after 10 min · red after 20 min</span>
  </div>

  <!-- STATS / FILTER TABS -->
  <div class="stats-bar">
    <div class="stat active" id="tab-all"    onclick="setFilter('all')">
      <div class="stat-num num-all"     id="cnt-all">0</div>
      <div class="stat-label">All Orders</div>
    </div>
    <div class="stat" id="tab-pending"  onclick="setFilter('pending')">
      <div class="stat-num num-pending" id="cnt-pending">0</div>
      <div class="stat-label">⏳ Pending</div>
    </div>
    <div class="stat" id="tab-cooking"  onclick="setFilter('cooking')">
      <div class="stat-num num-cooking" id="cnt-cooking">0</div>
      <div class="stat-label">🔥 Cooking</div>
    </div>
    <div class="stat" id="tab-ready"    onclick="setFilter('ready')">
      <div class="stat-num num-ready"   id="cnt-ready">0</div>
      <div class="stat-label">✅ Ready</div>
    </div>
    <div class="stat" id="tab-served"   onclick="setFilter('served')">
      <div class="stat-num num-served"  id="cnt-served">0</div>
      <div class="stat-label">🍽 Served</div>
    </div>
  </div>

  <!-- ORDER CARDS -->
  <div class="orders-area">
    <div class="orders-grid" id="orders-grid">
      <div class="no-orders">
        <span class="big-emoji">👨‍🍳</span>
        <p>Waiting for orders…</p>
      </div>
    </div>
  </div>


  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    /* ==============================================================
       1. FIREBASE CONFIG
       Use the SAME config values as index.html.
    ============================================================== */
    const firebaseConfig = {
      apiKey: "AIzaSyD2yOZznSm0jpmq4EaPA95JnfvcZWN2Ec0",
      authDomain: "create-b4da9.firebaseapp.com",
      databaseURL: "https://create-b4da9-default-rtdb.firebaseio.com",
      projectId: "create-b4da9",
      storageBucket: "create-b4da9.firebasestorage.app",
      messagingSenderId: "301948845653",
      appId: "1:301948845653:web:c5ed5b440727bf1ecbdedc",
      measurementId: "G-E7JPJZ5WJB"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /* ==============================================================
       2. STATE
    ============================================================== */
    const allOrders  = {};   // { firebaseKey: orderObject }
    let activeFilter = 'all';
    let isFirstLoad  = true; // Skip ping/flash on initial page load

    /* ==============================================================
       3. CONNECTION STATUS
    ============================================================== */
    db.ref('.info/connected').on('value', snap => {
      const ok = snap.val();
      document.getElementById('status-dot').className   = 'status-dot ' + (ok ? 'connected' : 'disconnected');
      document.getElementById('status-text').textContent = ok ? 'Live · Auto-updating' : 'Offline';
    });

    /* ==============================================================
       4. LIVE CLOCK
    ============================================================== */
    function updateClock() {
      const n = new Date();
      document.getElementById('clock').textContent =
        n.getHours().toString().padStart(2,'0') + ':' +
        n.getMinutes().toString().padStart(2,'0') + ':' +
        n.getSeconds().toString().padStart(2,'0');
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* ==============================================================
       5. ELAPSED TIME
    ============================================================== */
    function elapsedStr(ts) {
      const secs = Math.floor((Date.now() - ts) / 1000);
      if (secs < 60)  return secs + 's';
      const m = Math.floor(secs / 60), s = secs % 60;
      if (m < 60)     return m + 'm ' + s + 's';
      return Math.floor(m/60) + 'h ' + (m%60) + 'm';
    }
    function elapsedClass(ts) {
      const mins = (Date.now() - ts) / 60000;
      if (mins > 20) return 'alert';
      if (mins > 10) return 'warn';
      return '';
    }

    /* ==============================================================
       6. FILTER TABS
    ============================================================== */
    function setFilter(f) {
      activeFilter = f;
      ['all','pending','cooking','ready','served'].forEach(s => {
        document.getElementById('tab-'+s).classList.toggle('active', s === f);
      });
      renderOrders();
    }

    /* ==============================================================
       7. RENDER ORDER CARDS
    ============================================================== */
    function renderOrders() {
      const grid = document.getElementById('orders-grid');

      // Filter by active tab
      let list = Object.entries(allOrders);
      if (activeFilter !== 'all') {
        list = list.filter(([,o]) => o.status === activeFilter);
      }

      // Sort: served go to bottom; others by timestamp (oldest first — most urgent at top)
      list.sort(([,a],[,b]) => {
        if (a.status === 'served' && b.status !== 'served') return  1;
        if (b.status === 'served' && a.status !== 'served') return -1;
        return a.timestamp - b.timestamp;
      });

      // Update stat counts
      const counts = { all:0, pending:0, cooking:0, ready:0, served:0 };
      Object.values(allOrders).forEach(o => { counts.all++; counts[o.status]++; });
      Object.keys(counts).forEach(k => {
        document.getElementById('cnt-'+k).textContent = counts[k];
      });

      // Empty state
      if (list.length === 0) {
        grid.innerHTML = `<div class="no-orders">
          <span class="big-emoji">👨‍🍳</span>
          <p>${activeFilter === 'all' ? 'No orders yet — waiting for customers…' : 'No ' + activeFilter + ' orders'}</p>
        </div>`;
        return;
      }

      grid.innerHTML = '';
      list.forEach(([key, o]) => {
        const isTakeout = o.orderType === 'takeout';
        const card = document.createElement('div');
        card.className = 'order-card';
        card.id = 'card-' + key;

        // Item rows
        let itemsHTML = '';
        o.items.forEach(item => {
          itemsHTML += `<div class="card-item">
            <span class="card-item-label">${item.label}</span>
            <span>${item.emoji} ${item.name}</span>
          </div>`;
        });

        // Action buttons based on current status
        let actionsHTML = '';
        if (o.status === 'pending') {
          actionsHTML += `<button class="action-btn btn-start"  onclick="updateStatus('${key}','cooking')">🔥 Start</button>`;
        }
        if (o.status === 'cooking') {
          actionsHTML += `<button class="action-btn btn-ready"  onclick="updateStatus('${key}','ready')">✅ Ready</button>`;
        }
        if (o.status === 'ready') {
          actionsHTML += `<button class="action-btn btn-served" onclick="updateStatus('${key}','served')">${isTakeout ? '🥡 Handed Over' : '🍽 Served'}</button>`;
        }
        actionsHTML += `<button class="action-btn btn-delete" onclick="deleteOrder('${key}')" title="Remove order">🗑</button>`;

        card.innerHTML = `
          <div class="card-stripe ${o.status}"></div>
          <div class="card-header">
            <div>
              <div class="card-order-id">#${o.orderId}</div>
              <div class="card-order-type ${isTakeout ? 'type-takeout' : 'type-eatin'}">
                ${isTakeout ? '🥡 Take Out' : '🪑 Eat Here'}
              </div>
              ${!isTakeout ? `<div class="card-table">${o.table}</div>` : ''}
            </div>
            <div class="card-time-block">
              <div class="card-time">${o.time}</div>
              <div class="card-elapsed ${elapsedClass(o.timestamp)}" id="elapsed-${key}">
                ${elapsedStr(o.timestamp)}
              </div>
            </div>
          </div>
          <div class="card-items">${itemsHTML}</div>
          <div class="card-footer">
            <span class="status-pill pill-${o.status}">${o.status}</span>
            <div class="card-actions">${actionsHTML}</div>
          </div>`;

        grid.appendChild(card);
      });
    }

    /* ==============================================================
       8. UPDATE STATUS in Firebase
       Chef taps a button → Firebase updates → all screens reflect instantly
    ============================================================== */
    function updateStatus(key, newStatus) {
      db.ref('orders/' + key).update({ status: newStatus })
        .catch(err => console.error('Status update failed:', err));
    }

    /* ==============================================================
       9. DELETE ORDER from Firebase
    ============================================================== */
    function deleteOrder(key) {
      if (!confirm('Remove this order from the board?')) return;
      db.ref('orders/' + key).remove()
        .catch(err => console.error('Delete failed:', err));
    }

    /* ==============================================================
       10. TICK ELAPSED TIMERS every second (lightweight — no full re-render)
    ============================================================== */
    setInterval(() => {
      Object.entries(allOrders).forEach(([key, o]) => {
        if (o.status === 'served') return;
        const el = document.getElementById('elapsed-' + key);
        if (el) {
          el.textContent = elapsedStr(o.timestamp);
          el.className   = 'card-elapsed ' + elapsedClass(o.timestamp);
        }
      });
    }, 1000);

    /* ==============================================================
       11. FIREBASE REAL-TIME LISTENERS
    ============================================================== */

    // New order arrives
    db.ref('orders').on('child_added', snap => {
      allOrders[snap.key] = snap.val();

      if (!isFirstLoad) {
        // Flash the screen to alert the chef
        const flash = document.createElement('div');
        flash.className = 'new-order-flash';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 800);

        // Audio ping via Web Audio API
        try {
          const ctx  = new AudioContext();
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
          osc.start(); osc.stop(ctx.currentTime + 0.4);
        } catch(e) { /* blocked until user interaction — that's fine */ }
      }

      renderOrders();
    });

    // Order status changed by chef
    db.ref('orders').on('child_changed', snap => {
      allOrders[snap.key] = snap.val();
      renderOrders();
    });

    // Order deleted
    db.ref('orders').on('child_removed', snap => {
      delete allOrders[snap.key];
      renderOrders();
    });

    // After the initial load snapshot, enable new-order alerts
    db.ref('orders').once('value', () => {
      setTimeout(() => { isFirstLoad = false; }, 600);
    });
  </script>

</body>
</html>
