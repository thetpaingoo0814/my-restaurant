<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMAMI — Cashier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       SCREEN STYLES  (hidden when printing)
    ============================================================ */
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --card:      #181818;
      --border:    #252525;
      --accent:    #e8a838;
      --accent2:   #c45c2a;
      --text:      #f0ebe0;
      --muted:     #666;
      --success:   #27c06a;
      --danger:    #e74c3c;
      --warning:   #f5c518;
      --radius:    14px;
      --font-head: 'Bebas Neue', Impact, sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── TOP BAR ── */
    .top-bar {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0 28px;
      display: flex; align-items: center;
      justify-content: space-between;
      height: 64px; gap: 16px;
      flex-wrap: wrap;
    }
    .cashier-logo {
      font-family: var(--font-head);
      font-size: 1.9rem; letter-spacing: 0.08em; color: var(--accent);
    }
    .cashier-logo span { color: var(--muted); font-size: 0.95rem; letter-spacing: 0.18em; margin-left: 10px; }

    .top-status { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--muted); }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); transition: background 0.4s; }
    .status-dot.connected    { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.disconnected { background: var(--danger); }

    /* ── MAIN LAYOUT ── */
    .page-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    /* ── TABLE LOOKUP CARD ── */
    .lookup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 28px;
    }
    .lookup-title {
      font-family: var(--font-head);
      font-size: 1.6rem; letter-spacing: 0.06em;
      color: var(--accent); margin-bottom: 6px;
    }
    .lookup-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }

    .lookup-row {
      display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
    }
    .lookup-field { flex: 1; min-width: 200px; }
    .lookup-field label {
      display: block; font-size: 0.75rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
    }
    /* Required star */
    .lookup-field label .req { color: var(--danger); margin-left: 3px; }

    .lookup-field input {
      width: 100%;
      background: var(--card); border: 2px solid var(--border);
      border-radius: 8px; padding: 13px 16px;
      color: var(--text); font-family: var(--font-body);
      font-size: 1.05rem; outline: none;
      transition: border-color 0.2s;
    }
    .lookup-field input:focus { border-color: var(--accent); }
    .lookup-field input.error { border-color: var(--danger); }
    .lookup-field input::placeholder { color: var(--muted); }

    .btn-lookup {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 8px;
      padding: 13px 28px; font-family: var(--font-body);
      font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: opacity 0.2s, transform 0.12s;
      white-space: nowrap;
    }
    .btn-lookup:hover  { opacity: 0.88; transform: translateY(-1px); }
    .btn-lookup:active { transform: translateY(0); }

    .error-msg {
      color: var(--danger); font-size: 0.8rem;
      margin-top: 8px; min-height: 20px;
    }

    /* ── ORDERS FOUND SECTION ── */
    .orders-section { display: none; }
    .orders-section.visible { display: block; }

    .section-heading {
      font-family: var(--font-head);
      font-size: 1.3rem; letter-spacing: 0.06em;
      color: var(--text); margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-heading .table-badge {
      background: var(--accent); color: #1a1000;
      font-size: 0.8rem; padding: 3px 12px;
      border-radius: 20px; font-family: var(--font-body);
      font-weight: 700; letter-spacing: 0.04em;
    }

    /* Each order card */
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 12px;
      display: flex; gap: 14px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .order-card-left { flex: 1; min-width: 200px; }
    .order-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; flex-wrap: wrap;
    }
    .order-num {
      font-size: 0.75rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .order-time { font-size: 0.72rem; color: var(--muted); }

    /* Status pill */
    .order-status {
      font-size: 0.68rem; font-weight: 700;
      padding: 2px 9px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .status-pending { background: rgba(245,197,24,0.15); color: var(--warning); }
    .status-cooking { background: rgba(232,96,44,0.15);  color: #e8602c; }
    .status-ready   { background: rgba(39,192,106,0.15); color: var(--success); }
    .status-served  { background: rgba(255,255,255,0.07);color: var(--muted); }

    /* Item rows inside order card */
    .order-items { font-size: 0.84rem; }
    .order-item-row {
      display: flex; justify-content: space-between;
      padding: 3px 0; gap: 8px;
      border-bottom: 1px solid #1e1e1e;
    }
    .order-item-row:last-child { border-bottom: none; }
    .item-cat  { color: var(--muted); font-size: 0.7rem; min-width: 54px; }
    .item-nm   { flex: 1; }
    .item-pr   { color: var(--accent); font-weight: 600; white-space: nowrap; }

    /* Order subtotal */
    .order-subtotal {
      text-align: right; font-weight: 700;
      font-size: 0.9rem; margin-top: 10px;
      color: var(--text);
    }
    .order-subtotal span { color: var(--accent); }

    /* No orders message */
    .no-orders-msg {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 40px;
      text-align: center; color: var(--muted);
      font-size: 0.95rem;
    }
    .no-orders-msg .big { font-size: 2.4rem; margin-bottom: 10px; display: block; }

    /* ── GRAND TOTAL + CASH PAYMENT CARD ── */
    .payment-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-top: 24px;
    }
    .payment-title {
      font-family: var(--font-head);
      font-size: 1.4rem; letter-spacing: 0.06em;
      color: var(--text); margin-bottom: 20px;
    }

    /* Grand total display */
    .grand-total-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 14px 0; border-bottom: 1px solid var(--border); margin-bottom: 22px;
    }
    .grand-label {
      font-family: var(--font-head); font-size: 1.1rem; color: var(--muted); letter-spacing: 0.06em;
    }
    .grand-amount {
      font-family: var(--font-head); font-size: 2.8rem;
      color: var(--accent); font-weight: 700; letter-spacing: 0.04em;
    }

    /* Cash input row */
    .cash-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 500px) { .cash-row { grid-template-columns: 1fr; } }

    .cash-field label {
      display: block; font-size: 0.75rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
    }
    .cash-field input {
      width: 100%;
      background: var(--card); border: 2px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
      color: var(--text); font-family: var(--font-body);
      font-size: 1.2rem; font-weight: 700; outline: none;
      transition: border-color 0.2s;
    }
    .cash-field input:focus { border-color: var(--accent); }

    /* Change display */
    .change-display {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .change-label { font-size: 0.82rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .change-amount {
      font-family: var(--font-head); font-size: 2rem;
      letter-spacing: 0.05em; color: var(--success);
    }
    .change-amount.insufficient { color: var(--danger); }

    /* Quick cash buttons */
    .quick-cash-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .quick-cash-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .quick-btn {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 14px;
      color: var(--text); font-family: var(--font-body);
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .quick-btn:hover { border-color: var(--accent); background: #1e1a10; color: var(--accent); }

    /* Action buttons row */
    .action-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-confirm {
      flex: 1; min-width: 160px;
      background: linear-gradient(135deg, var(--success), #1a9e54);
      color: #fff; border: none; border-radius: 8px;
      padding: 14px 20px; font-family: var(--font-body);
      font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: opacity 0.2s, transform 0.12s;
    }
    .btn-confirm:hover:not(:disabled)  { opacity: 0.88; transform: translateY(-1px); }
    .btn-confirm:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-print {
      flex: 1; min-width: 140px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      padding: 14px 20px; font-family: var(--font-body);
      font-weight: 600; font-size: 1rem; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-print:hover:not(:disabled) { border-color: var(--accent); background: #1e1a10; color: var(--accent); }
    .btn-print:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Payment confirmed banner */
    .paid-banner {
      display: none;
      background: rgba(39,192,106,0.12);
      border: 1px solid rgba(39,192,106,0.3);
      border-radius: 8px;
      padding: 14px 20px;
      color: var(--success);
      font-weight: 600;
      text-align: center;
      margin-top: 12px;
      font-size: 1rem;
    }
    .paid-banner.visible { display: block; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================================
       PRINT STYLES  — only the receipt renders when printing
    ============================================================ */
    @media print {
      /* Hide everything on screen */
      body > *                  { display: none !important; }
      /* Show only the receipt */
      #receipt-printable        { display: block !important; }

      #receipt-printable {
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        color: #000;
        background: #fff;
        width: 300px;          /* standard 80mm thermal receipt width */
        margin: 0 auto;
        padding: 12px 8px;
        line-height: 1.5;
      }

      .rcp-logo {
        font-size: 22px;
        font-weight: 900;
        text-align: center;
        letter-spacing: 4px;
        margin-bottom: 2px;
      }
      .rcp-tagline {
        text-align: center;
        font-size: 10px;
        color: #555;
        margin-bottom: 12px;
      }
      .rcp-divider-thick {
        border: none; border-top: 2px solid #000;
        margin: 6px 0;
      }
      .rcp-divider-thin {
        border: none; border-top: 1px dashed #888;
        margin: 6px 0;
      }
      .rcp-meta {
        font-size: 10px; color: #444;
        margin-bottom: 4px;
      }
      .rcp-section-head {
        font-weight: 700; font-size: 11px;
        text-transform: uppercase; letter-spacing: 1px;
        margin: 8px 0 4px;
      }
      .rcp-order-block { margin-bottom: 6px; }
      .rcp-order-title {
        font-weight: 700; font-size: 10px;
        border-bottom: 1px dashed #ccc;
        padding-bottom: 2px; margin-bottom: 3px;
        color: #333;
      }
      .rcp-item-row {
        display: flex; justify-content: space-between;
        font-size: 11px; padding: 1px 0;
      }
      .rcp-item-name { flex: 1; }
      .rcp-item-price { white-space: nowrap; padding-left: 8px; }
      .rcp-subtotal-row {
        display: flex; justify-content: space-between;
        font-size: 10px; color: #555;
        padding: 2px 0; border-top: 1px dashed #ddd; margin-top: 2px;
      }
      .rcp-grand-total {
        display: flex; justify-content: space-between;
        font-size: 15px; font-weight: 900;
        padding: 6px 0; margin-top: 4px;
      }
      .rcp-cash-row {
        display: flex; justify-content: space-between;
        font-size: 12px; padding: 2px 0;
      }
      .rcp-change-row {
        display: flex; justify-content: space-between;
        font-size: 13px; font-weight: 700;
        padding: 4px 0; border-top: 1px solid #000;
      }
      .rcp-footer {
        text-align: center;
        font-size: 10px; color: #555;
        margin-top: 12px;
      }
      .rcp-barcode {
        text-align: center;
        font-size: 9px; letter-spacing: 3px;
        color: #999; margin-top: 4px;
      }
    }

    /* Hide receipt div on screen */
    #receipt-printable { display: none; }
  </style>
</head>
<body>

  <!-- ============================================================
       TOP BAR
  ============================================================ -->
  <div class="top-bar">
    <div class="cashier-logo">UMAMI <span>CASHIER</span></div>
    <div class="top-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </div>

  <!-- ============================================================
       MAIN PAGE
  ============================================================ -->
  <div class="page-body">

    <!-- ── TABLE LOOKUP ── -->
    <div class="lookup-card">
      <h2 class="lookup-title">Table Lookup</h2>
      <p class="lookup-sub">Enter the table number to load all orders and calculate the bill.</p>

      <div class="lookup-row">
        <div class="lookup-field">
          <label for="table-input">Table Number <span class="req">*</span></label>
          <input
            type="text"
            id="table-input"
            placeholder="e.g. Table 3"
            maxlength="30"
            autocomplete="off"
          />
        </div>
        <button class="btn-lookup" onclick="lookupTable()">
          🔍 Load Orders
        </button>
      </div>
      <p class="error-msg" id="lookup-error"></p>
    </div>

    <!-- ── ORDERS LIST ── -->
    <div class="orders-section" id="orders-section">

      <div class="section-heading">
        Orders for
        <span class="table-badge" id="table-badge-label">Table —</span>
      </div>

      <div id="orders-list">
        <!-- order cards rendered by JS -->
      </div>

      <!-- ── PAYMENT PANEL ── -->
      <div class="payment-card" id="payment-card">
        <h3 class="payment-title">💵 Cash Payment</h3>

        <div class="grand-total-row">
          <span class="grand-label">Grand Total</span>
          <span class="grand-amount" id="grand-amount">¥0</span>
        </div>

        <!-- Quick cash denomination buttons -->
        <p class="quick-cash-label">Quick Fill</p>
        <div class="quick-cash-btns" id="quick-btns">
          <!-- built by JS based on total -->
        </div>

        <div class="cash-row">
          <div class="cash-field">
            <label>Cash Received</label>
            <input
              type="number"
              id="cash-received"
              placeholder="0"
              min="0"
              oninput="calcChange()"
            />
          </div>
          <div class="cash-field">
            <!-- Change display inside an input-like box, read-only -->
            <label>Change to Return</label>
            <div class="change-display">
              <span class="change-label">Change</span>
              <span class="change-amount" id="change-display">¥0</span>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button class="btn-confirm" id="btn-confirm" onclick="confirmPayment()" disabled>
            ✅ Confirm Payment
          </button>
          <button class="btn-print" id="btn-print" onclick="printReceipt()" disabled>
            🖨 Print Receipt
          </button>
        </div>

        <div class="paid-banner" id="paid-banner">
          ✅ Payment confirmed! Receipt is ready to print.
        </div>

      </div><!-- end payment-card -->
    </div><!-- end orders-section -->

  </div><!-- end page-body -->


  <!-- ============================================================
       RECEIPT (hidden on screen, printed when window.print() called)
  ============================================================ -->
  <div id="receipt-printable">
    <!-- Populated by JS just before printing -->
  </div>


  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    /* ==============================================================
       1.  FIREBASE CONFIG
    ============================================================== */
    const firebaseConfig = {
      apiKey:            "AIzaSyD2yOZznSm0jpmq4EaPA95JnfvcZWN2Ec0",
      authDomain:        "create-b4da9.firebaseapp.com",
      databaseURL:       "https://create-b4da9-default-rtdb.firebaseio.com",
      projectId:         "create-b4da9",
      storageBucket:     "create-b4da9.firebasestorage.app",
      messagingSenderId: "301948845653",
      appId:             "1:301948845653:web:c5ed5b440727bf1ecbdedc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('.info/connected').on('value', snap => {
      const ok = snap.val();
      document.getElementById('status-dot').className   = 'status-dot ' + (ok ? 'connected' : 'disconnected');
      document.getElementById('status-text').textContent = ok ? 'Connected' : 'Offline';
    });

    /* ==============================================================
       2.  STATE
    ============================================================== */
    let currentTableOrders = [];   // array of order objects for the loaded table
    let grandTotal         = 0;
    let paymentConfirmed   = false;

    /* ==============================================================
       3.  HELPERS
    ============================================================== */
    // Change currency symbol here if needed
    const fmt = n => '¥' + Number(n).toLocaleString();

    function nowDateTime() {
      const d = new Date();
      return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0') + '  ' +
        String(d.getHours()).padStart(2,'0') + ':' +
        String(d.getMinutes()).padStart(2,'0');
    }

    // Generate a receipt number from date + random
    function receiptNo() {
      const d = new Date();
      return 'RCP-' + d.getFullYear().toString().slice(2) +
        String(d.getMonth()+1).padStart(2,'0') +
        String(d.getDate()).padStart(2,'0') + '-' +
        Math.floor(1000 + Math.random() * 9000);
    }

    /* ==============================================================
       4.  TABLE LOOKUP
    ============================================================== */
    // Allow pressing Enter in the input to trigger lookup
    document.getElementById('table-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') lookupTable();
    });

    async function lookupTable() {
      const input  = document.getElementById('table-input');
      const errEl  = document.getElementById('lookup-error');
      const tableVal = input.value.trim();

      // ── Validation: table number is required ──
      if (!tableVal) {
        input.classList.add('error');
        errEl.textContent = '⚠ Table number is required.';
        input.focus();
        return;
      }
      input.classList.remove('error');
      errEl.textContent = '';

      // Reset state
      currentTableOrders = [];
      grandTotal         = 0;
      paymentConfirmed   = false;

      // Show loading state on button
      const btn = document.querySelector('.btn-lookup');
      btn.textContent = '⏳ Loading…';
      btn.disabled = true;

      try {
        // Fetch ALL orders from Firebase
        const snap = await db.ref('orders').once('value');
        const all  = snap.val() || {};

        // Filter by table number (case-insensitive match)
        const tableNorm = tableVal.toLowerCase();
        Object.entries(all).forEach(([key, order]) => {
          // Match on table field (not takeout)
          if (
            order.table &&
            order.table.toLowerCase() === tableNorm &&
            order.orderType !== 'takeout'
          ) {
            currentTableOrders.push({ key, ...order });
          }
        });

        // Sort by timestamp (oldest first)
        currentTableOrders.sort((a, b) => a.timestamp - b.timestamp);

        // Render results
        renderOrders(tableVal);

      } catch (err) {
        errEl.textContent = '⚠ Failed to load orders. Check your connection.';
        console.error(err);
      }

      btn.textContent = '🔍 Load Orders';
      btn.disabled = false;
    }

    /* ==============================================================
       5.  RENDER ORDER CARDS
    ============================================================== */
    function renderOrders(tableLabel) {
      const section   = document.getElementById('orders-section');
      const list      = document.getElementById('orders-list');
      const badgeEl   = document.getElementById('table-badge-label');
      const grandEl   = document.getElementById('grand-amount');

      section.classList.add('visible');
      badgeEl.textContent = tableLabel;

      // Reset payment UI
      document.getElementById('paid-banner').classList.remove('visible');
      document.getElementById('btn-confirm').disabled = true;
      document.getElementById('btn-print').disabled   = true;
      document.getElementById('cash-received').value  = '';
      document.getElementById('change-display').textContent = fmt(0);
      document.getElementById('change-display').className   = 'change-amount';

      list.innerHTML = '';

      if (currentTableOrders.length === 0) {
        list.innerHTML = `
          <div class="no-orders-msg">
            <span class="big">🔍</span>
            No orders found for <strong>${tableLabel}</strong>.<br/>
            Check the table number and try again.
          </div>`;
        grandEl.textContent = fmt(0);
        grandTotal = 0;
        buildQuickButtons(0);
        return;
      }

      // Calculate grand total and render each order card
      grandTotal = 0;
      currentTableOrders.forEach(order => {
        grandTotal += order.total || 0;

        const card = document.createElement('div');
        card.className = 'order-card';

        // Build item rows
        let itemsHTML = '';
        (order.items || []).forEach(item => {
          itemsHTML += `
            <div class="order-item-row">
              <span class="item-cat">${item.label}</span>
              <span class="item-nm">${item.emoji || ''} ${item.name}</span>
              <span class="item-pr">${fmt(item.price)}</span>
            </div>`;
        });

        card.innerHTML = `
          <div class="order-card-left">
            <div class="order-meta">
              <span class="order-num">#${order.orderId}</span>
              <span class="order-time">⏱ ${order.time || ''}</span>
              <span class="order-status status-${order.status || 'pending'}">${order.status || 'pending'}</span>
            </div>
            <div class="order-items">${itemsHTML}</div>
            <div class="order-subtotal">Subtotal: <span>${fmt(order.total)}</span></div>
          </div>`;

        list.appendChild(card);
      });

      grandEl.textContent = fmt(grandTotal);
      buildQuickButtons(grandTotal);

      // Enable confirm button only when there are orders
      document.getElementById('btn-confirm').disabled = false;
    }

    /* ==============================================================
       6.  QUICK CASH BUTTONS
       Generates rounded-up denomination buttons above the total
    ============================================================== */
    function buildQuickButtons(total) {
      const container = document.getElementById('quick-btns');
      container.innerHTML = '';
      if (total === 0) return;

      // Always include exact amount + a few rounded-up denominations
      const denominations = [500, 1000, 2000, 5000, 10000];
      const suggestions   = new Set();

      suggestions.add(total);   // exact amount

      denominations.forEach(d => {
        const rounded = Math.ceil(total / d) * d;
        if (rounded >= total && rounded <= total * 3) suggestions.add(rounded);
      });

      // Sort and deduplicate
      [...suggestions].sort((a,b) => a-b).forEach(amount => {
        const btn = document.createElement('button');
        btn.className = 'quick-btn';
        btn.textContent = fmt(amount);
        btn.onclick = () => {
          document.getElementById('cash-received').value = amount;
          calcChange();
        };
        container.appendChild(btn);
      });
    }

    /* ==============================================================
       7.  CALCULATE CHANGE
    ============================================================== */
    function calcChange() {
      const cashInput = document.getElementById('cash-received');
      const changeEl  = document.getElementById('change-display');
      const confirmBtn = document.getElementById('btn-confirm');

      const cash   = parseFloat(cashInput.value) || 0;
      const change = cash - grandTotal;

      changeEl.textContent = fmt(Math.abs(change));

      if (cash === 0) {
        changeEl.textContent = fmt(0);
        changeEl.className   = 'change-amount';
        confirmBtn.disabled  = true;
      } else if (change < 0) {
        // Not enough cash
        changeEl.className  = 'change-amount insufficient';
        confirmBtn.disabled = true;
      } else {
        // Sufficient cash
        changeEl.className  = 'change-amount';
        confirmBtn.disabled = currentTableOrders.length === 0;
      }
    }

    /* ==============================================================
       8.  CONFIRM PAYMENT
       Marks all orders for this table as "served" in Firebase
    ============================================================== */
    async function confirmPayment() {
      const btn = document.getElementById('btn-confirm');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Processing…';

      try {
        // Update each order's status to 'served' in Firebase
        const updates = {};
        currentTableOrders.forEach(order => {
          updates[`orders/${order.key}/status`] = 'served';
        });
        await db.ref().update(updates);

        paymentConfirmed = true;

        document.getElementById('paid-banner').classList.add('visible');
        document.getElementById('btn-print').disabled = false;

        btn.innerHTML = '✅ Paid';
        btn.style.background = 'rgba(39,192,106,0.2)';
        btn.style.color       = 'var(--success)';
        btn.style.border      = '1px solid var(--success)';

      } catch (err) {
        console.error('Payment update failed:', err);
        document.getElementById('lookup-error').textContent = '⚠ Could not update order status. Receipt can still be printed.';
        document.getElementById('btn-print').disabled = false;
        paymentConfirmed = true;
        btn.disabled = false;
        btn.textContent = '✅ Confirm Payment';
      }
    }

    /* ==============================================================
       9.  BUILD & PRINT RECEIPT
    ============================================================== */
    function printReceipt() {
      const tableLabel  = document.getElementById('table-input').value.trim();
      const cashIn      = parseFloat(document.getElementById('cash-received').value) || 0;
      const change      = cashIn - grandTotal;
      const rcpNum      = receiptNo();
      const dateTime    = nowDateTime();

      // ── Build receipt HTML ──
      let orderBlocksHTML = '';
      currentTableOrders.forEach((order, idx) => {
        let itemRows = '';
        (order.items || []).forEach(item => {
          itemRows += `
            <div class="rcp-item-row">
              <span class="rcp-item-name">${item.emoji || ''} ${item.name} (${item.label})</span>
              <span class="rcp-item-price">${fmt(item.price)}</span>
            </div>`;
        });

        orderBlocksHTML += `
          <div class="rcp-order-block">
            <div class="rcp-order-title">Order #${order.orderId}  —  ${order.time || ''}</div>
            ${itemRows}
            <div class="rcp-subtotal-row">
              <span>Subtotal</span>
              <span>${fmt(order.total)}</span>
            </div>
          </div>`;
      });

      document.getElementById('receipt-printable').innerHTML = `
        <div class="rcp-logo">UMAMI</div>
        <div class="rcp-tagline">Custom Bowl Builder · Fresh to Order</div>

        <hr class="rcp-divider-thick" />

        <div class="rcp-meta">Receipt No: ${rcpNum}</div>
        <div class="rcp-meta">Date/Time:  ${dateTime}</div>
        <div class="rcp-meta">Table:      ${tableLabel}</div>

        <hr class="rcp-divider-thin" />

        <div class="rcp-section-head">Order Details</div>
        ${orderBlocksHTML}

        <hr class="rcp-divider-thick" />

        <div class="rcp-grand-total">
          <span>TOTAL</span>
          <span>${fmt(grandTotal)}</span>
        </div>

        <hr class="rcp-divider-thin" />

        <div class="rcp-cash-row">
          <span>Cash Received</span>
          <span>${fmt(cashIn)}</span>
        </div>
        <div class="rcp-change-row">
          <span>CHANGE</span>
          <span>${fmt(change >= 0 ? change : 0)}</span>
        </div>

        <hr class="rcp-divider-thick" />

        <div class="rcp-footer">
          Thank you for dining with us!<br/>
          Please come again 🍜
        </div>
        <div class="rcp-barcode">${rcpNum}</div>
      `;

      // Trigger browser print dialog
      window.print();
    }

  </script>
</body>
